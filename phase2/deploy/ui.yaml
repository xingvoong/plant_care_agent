apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plant-ui
  template:
    metadata:
      labels:
        app: plant-ui
    spec:
      serviceAccountName: plant-operator
      containers:
        - name: ui
          image: plant-ui:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: PLANT_NAMESPACE
              value: default
---
apiVersion: v1
kind: Service
metadata:
  name: plant-ui
  namespace: default
spec:
  type: NodePort
  selector:
    app: plant-ui
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
